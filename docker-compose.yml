# Docker Compose para DESENVOLVIMENTO LOCAL.
#
# Sobe apenas o banco PostgreSQL em container — a aplicação Next.js roda
# diretamente na sua máquina com `npm run dev`. Em produção a aplicação é
# hospedada na Vercel (que usa seu próprio banco gerenciado).
#
# Uso:
#   docker compose up -d        # sobe o banco
#   docker compose down         # para o banco (mantém os dados)
#   docker compose down -v      # para e APAGA os dados

services:
  db:
    image: postgres:16-alpine
    container_name: rinha-team-finder-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rinha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rinha}
      POSTGRES_DB: ${POSTGRES_DB:-rinha}
    ports:
      # Porta do HOST configurável via DB_PORT (default 5432).
      # Use outra (ex.: 5433) se já tiver um PostgreSQL local ocupando a 5432.
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rinha}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
